server:
  port: 8080

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:80,http://localhost:3000}

spring:
  application:
    name: ai-teacher-studio

  main:
    allow-bean-definition-overriding: true

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ai_teacher
    username: postgres
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aiteacher.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# PPT Generation
ppt:
  node-script: ${PPT_NODE_SCRIPT:./scripts/generate-ppt.js}
  output-dir: ${PPT_OUTPUT_DIR:/tmp/ppt}

# Video Generation
video:
  output-dir: ${VIDEO_OUTPUT_DIR:/tmp/video}
  ffmpeg-path: ${FFMPEG_PATH:ffmpeg}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER}
  secret-key: ${MINIO_ROOT_PASSWORD}
  bucket-name: ai-teacher
  secure: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  header: Authorization
  prefix: Bearer

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  prometheus:
    metrics:
      export:
        enabled: true

# AI Provider Configuration
ai:
  openai:
    api-key: ${AI_OPENAI_API_KEY:${OPENAI_API_KEY:}}
    base-url: ${AI_OPENAI_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com}}
    model: gpt-4o
  claude:
    api-key: ${AI_CLAUDE_API_KEY:${CLAUDE_API_KEY:}}
    base-url: ${AI_CLAUDE_BASE_URL:${CLAUDE_BASE_URL:https://api.anthropic.com}}
    model: claude-3-5-sonnet-20240620
  qwen:
    api-key: ${AI_QWEN_API_KEY:${QWEN_API_KEY:}}
    base-url: ${AI_QWEN_BASE_URL:${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}
    model: qwen-max
  minimax:
    api-key: ${AI_MINIMAX_API_KEY:}
    base-url: ${AI_MINIMAX_BASE_URL:https://api.minimax.chat/v1}
    model: MiniMax-Text-01

logging:
  level:
    com.aiteacher: INFO
    org.springframework: INFO

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}