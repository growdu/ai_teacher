server:
  port: 8080

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:80,http://localhost:3000}

spring:
  application:
    name: ai-teacher-studio
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  main:
    allow-bean-definition-overriding: true

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ai_teacher
    username: postgres
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 2000ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aiteacher.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Async Task Thread Pool
task:
  executor:
    core-pool-size: 20
    max-pool-size: 100
    queue-capacity: 500
    thread-name-prefix: async-task-
    keep-alive-seconds: 60
    await-termination-seconds: 300

# Payment Configuration
payment:
  enabled: ${PAYMENT_ENABLED:false}
  environment: ${PAYMENT_ENVIRONMENT:production}
  sandbox-enabled: ${ALIPAY_SANDBOX_ENABLED:false}
  # Alipay
  alipay-app-id: ${ALIPAY_APP_ID:}
  alipay-private-key: ${ALIPAY_PRIVATE_KEY:}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
  alipay-notify-url: ${ALIPAY_NOTIFY_URL:}
  alipay-return-url: ${ALIPAY_RETURN_URL:}
  # WeChat Pay
  wechat-mch-id: ${WECHAT_MCH_ID:}
  wechat-serial-no: ${WECHAT_SERIAL_NO:}
  wechat-private-key: ${WECHAT_PRIVATE_KEY:}
  wechat-api-v3-key: ${WECHAT_API_V3_KEY:}
  wechat-notify-url: ${WECHAT_NOTIFY_URL:}
  wechat-app-id: ${WECHAT_APP_ID:}

# PPT Generation
ppt:
  node-script: ${PPT_NODE_SCRIPT:./scripts/generate-ppt.js}
  output-dir: ${PPT_OUTPUT_DIR:/tmp/ppt}

# Video Generation
video:
  output-dir: ${VIDEO_OUTPUT_DIR:/tmp/video}
  ffmpeg-path: ${FFMPEG_PATH:ffmpeg}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER}
  secret-key: ${MINIO_ROOT_PASSWORD}
  bucket-name: ai-teacher
  secure: false

jwt:
  secret: ${JWT_SECRET:-test-jwt-secret-at-least-32-characters-long-for-hs256}
  expiration: 86400000
  refresh-expiration: 604800000
  header: Authorization
  prefix: Bearer

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    circuitbreakers:
      enabled: true

# AI Provider Configuration
ai:
  openai:
    api-key: ${AI_OPENAI_API_KEY:${OPENAI_API_KEY:}}
    base-url: ${AI_OPENAI_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com}}
    model: gpt-4o
  claude:
    api-key: ${AI_CLAUDE_API_KEY:${CLAUDE_API_KEY:}}
    base-url: ${AI_CLAUDE_BASE_URL:${CLAUDE_BASE_URL:https://api.anthropic.com}}
    model: claude-3-5-sonnet-20240620
  qwen:
    api-key: ${AI_QWEN_API_KEY:${QWEN_API_KEY:}}
    base-url: ${AI_QWEN_BASE_URL:${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}
    model: qwen-max
  minimax:
    api-key: ${AI_MINIMAX_API_KEY:}
    base-url: ${AI_MINIMAX_BASE_URL:https://api.minimax.chat/v1}
    model: MiniMax-Text-01

logging:
  level:
    com.aiteacher: INFO
    org.springframework: INFO

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      aiProvider:
        baseConfig: default
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
      slowAI:
        baseConfig: default
        slidingWindowType: TIME_BASED
        slidingWindowSize: 100
        minimumNumberOfCalls: 20
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 10s
  timelimiter:
    configs:
      default:
        timeoutDuration: 30s
        cancelRunningFuture: true
    instances:
      aiProvider:
        baseConfig: default
        timeoutDuration: 60s