# AI Teacher Studio — Production Docker Compose
# ===============================================================
# All services share the `ai-teacher` network.
# Only Nginx (reverse proxy) ports are exposed to the host.
# External traffic enters via Nginx on port 80/443.
# ===============================================================

networks:
  ai-teacher:
    driver: bridge

services:
  # ── Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: ai-teacher-postgres
    networks:
      - ai-teacher
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ai_teacher
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Cache ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-teacher-redis
    networks:
      - ai-teacher
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Object Storage ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ai-teacher-minio
    networks:
      - ai-teacher
    ports:
      - "127.0.0.1:9000:9000"   # Only localhost — accessed via backend
      - "127.0.0.1:9001:9001"   # MinIO Console — restrict to localhost
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ai-teacher-backend:local
    container_name: ai-teacher-backend
    networks:
      - ai-teacher
    ports:
      - "8080:8080"  # External access for direct API calls
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_teacher
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_MAIN_ALLOW_CIRCULAR_REFERENCES: "true"
      AI_OPENAI_API_KEY: ${AI_OPENAI_API_KEY:-}
      AI_CLAUDE_API_KEY: ${AI_CLAUDE_API_KEY:-}
      AI_QWEN_API_KEY: ${AI_QWEN_API_KEY:-}
      AI_MINIMAX_API_KEY: ${AI_MINIMAX_API_KEY:-}
      AI_MINIMAX_VIDEO_API_KEY: ${AI_MINIMAX_VIDEO_API_KEY:-}
      AI_MOCK_ENABLED: ${AI_MOCK_ENABLED:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:80,http://localhost:3000}
      # Payment Configuration
      PAYMENT_ENABLED: ${PAYMENT_ENABLED:-false}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL:-}
      ALIPAY_RETURN_URL: ${ALIPAY_RETURN_URL:-}
      ALIPAY_SANDBOX_ENABLED: ${ALIPAY_SANDBOX_ENABLED:-true}
      WECHAT_MCH_ID: ${WECHAT_MCH_ID:-}
      WECHAT_SERIAL_NO: ${WECHAT_SERIAL_NO:-}
      WECHAT_PRIVATE_KEY: ${WECHAT_PRIVATE_KEY:-}
      WECHAT_API_V3_KEY: ${WECHAT_API_V3_KEY:-}
      WECHAT_NOTIFY_URL: ${WECHAT_NOTIFY_URL:-}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Frontend Web ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-teacher-frontend
    networks:
      - ai-teacher
    ports:
      - "3000:80"  # External access for web UI
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Nginx Reverse Proxy (Host Entry Point) ───────────────────
  nginx:
    image: nginx:alpine
    container_name: ai-teacher-nginx
    network_mode: host
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro   # SSL certificates (fullchain.pem + privkey.pem)
      - ./deploy/nginx/vite.svg:/usr/share/nginx/html/vite.svg:ro
      - ./deploy/nginx/html:/var/www/html:ro  # ACME challenge for Let's Encrypt
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_logs:
